<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Processing Example</title>
</head>
<body>

<input type="file" id="audioInput" accept="audio/*">
<audio id="audioPlayer" controls></audio>

<script>
document.getElementById('audioInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) {
        return;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const reader = new FileReader();

    reader.onload = function(fileEvent) {
        const arrayBuffer = fileEvent.target.result;

        // Decode the audio file data in arrayBuffer
        audioCtx.decodeAudioData(arrayBuffer, function(audioBuffer) {
            // Process each sample and create a new buffer
            const outputBuffer = audioCtx.createBuffer(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);

            // Iterate over each channel
            for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
                const inputData = audioBuffer.getChannelData(channel);
                const outputData = outputBuffer.getChannelData(channel);

                // Iterate over each sample
                for (let sample = 0; sample < audioBuffer.length; sample++) {
                    // This is where you can process each sample. Here we're just copying the input to the output.
                    console.log("Sample number: " + sample);
                    outputData[sample] = inputData[sample];
                }
            }

            // Play the processed buffer
            const source = audioCtx.createBufferSource();
            source.buffer = outputBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }, function(e){"Error with decoding audio data" + e.err});
    };

    reader.readAsArrayBuffer(file);
});
</script>
</body>
</html>
